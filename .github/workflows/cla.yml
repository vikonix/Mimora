name: "CLA Assistant"

# Triggered by PR events and by the sign-off comment.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Minimum permissions required by the bot.
# contents: write is needed because signatures are stored in this repository.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        # Runs on the PR itself, or when a contributor posts the sign-off phrase.
        if: |
          (github.event.comment.body == 'recreate-cla' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Where the bot stores the signature registry (JSON in this repository).
          path-to-signatures: 'signatures/version1/cla.json'

          # Link to the CLA text shown to the contributor.
          # REPLACE YOUR_GITHUB_USERNAME with your login/organization.
          path-to-document: 'https://github.com/vikonix/Mimora/blob/main/CLA.md'

          # Branch where the bot commits the signatures file.
          branch: 'main'

          # Phrase a contributor uses to sign the CLA in a PR comment.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'

          # Accounts that don't need to sign the CLA (yourself, bots).
          # REPLACE with your login. Use masks like dependabot[bot] for bots.
          allowlist: 'vikonix,dependabot[bot],*[bot]'
